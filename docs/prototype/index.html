<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoPay Manager - Premium Features</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Hero CTA Card -->
        <div class="hero-card">
            <div class="premium-badge">
                <span>⭐ PREMIUM</span>
            </div>
            <h1>Start Your Free Trial</h1>
            <p class="hero-subtitle">Get full access to all premium features</p>
            <button class="trial-button">1 Day <span class="light-text">Free Trial</span></button>
        </div>

        <!-- Features Section -->
        <section class="features-section">
            <h2>Premium Features</h2>
            <div class="features-list" id="featuresList"></div>
        </section>

        <!-- Bottom CTA -->
        <button class="cta-button">
            <span class="check-icon">✓</span>
            START FREE TRIAL
        </button>
    </div>

    <script src="app.js"></script>
</body>
</html>
