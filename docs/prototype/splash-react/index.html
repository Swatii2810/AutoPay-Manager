<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutoPay Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: '#3D5AFE',
            'brand-light': '#6B8EFF',
            'brand-bg': '#EEF1FF',
          },
          fontFamily: {
            sans: ['Inter', 'Segoe UI', 'sans-serif'],
          },
          keyframes: {
            'scale-in': {
              '0%':   { transform: 'scale(0.6)', opacity: '0' },
              '100%': { transform: 'scale(1)',   opacity: '1' },
            },
            'fade-in': {
              '0%':   { opacity: '0' },
              '100%': { opacity: '1' },
            },
            'fade-out': {
              '0%':   { opacity: '1' },
              '100%': { opacity: '0' },
            },
            'progress': {
              '0%':   { width: '0%' },
              '100%': { width: '100%' },
            },
          },
          animation: {
            'scale-in':  'scale-in 0.6s ease-out forwards',
            'fade-in':   'fade-in 0.4s ease-in forwards',
            'fade-in-delayed': 'fade-in 0.4s ease-in 0.5s forwards',
            'fade-out':  'fade-out 0.4s ease-out forwards',
            'progress':  'progress 1.8s linear forwards',
          },
        },
      },
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    .opacity-0-init { opacity: 0; }
  </style>
</head>
<body class="bg-white font-sans">
  <div id="root"></div>
  <script type="text/babel" src="SplashScreen.jsx"></script>
  <script type="text/babel" src="App.jsx"></script>
  <script type="text/babel">
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
